<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Claude API key</title>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:transparent; overflow:hidden;
    font-family:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
    -webkit-user-select:none; user-select:none; cursor:default; }
  body{ display:flex; align-items:center; justify-content:center; padding:8px; }
  .card{
    width:100%; border-radius:18px; padding:16px 18px 14px; color:rgba(255,250,244,.96);
    background:linear-gradient(180deg, rgba(158,134,104,.98) 0%, rgba(144,120,92,.98) 45%, rgba(126,100,74,.98) 100%);
    backdrop-filter:blur(18px) saturate(130%); -webkit-backdrop-filter:blur(18px) saturate(130%);
    box-shadow:0 16px 38px -10px rgba(44,28,12,.55), inset 0 1px 0 rgba(255,244,228,.4), inset 0 0 0 1px rgba(255,244,228,.14);
  }
  .title{ font-size:14px; font-weight:680; letter-spacing:.2px; }
  .sub{ font-size:11px; line-height:1.35; opacity:.82; margin-top:3px; }
  input{
    width:100%; margin-top:11px; padding:9px 11px; border-radius:10px; border:0; outline:0;
    font-size:13px; font-family:inherit; color:#4a3624; background:rgba(255,250,243,.96);
    box-shadow:inset 0 0 0 1px rgba(120,92,60,.22), inset 0 1px 2px rgba(44,28,12,.12);
    -webkit-user-select:text; user-select:text;
  }
  input::placeholder{ color:rgba(120,92,60,.6); }
  .row{ display:flex; align-items:center; justify-content:space-between; margin-top:11px; gap:10px; }
  .status{ font-size:11px; opacity:.85; }
  .actions{ display:flex; gap:8px; }
  button{ font:inherit; font-size:12px; font-weight:640; border:0; border-radius:9px; padding:7px 14px; cursor:pointer; }
  .save{ background:linear-gradient(180deg,#F4AC42,#E68A22); color:#fff; box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 3px 8px -2px rgba(176,104,18,.5); }
  .save:hover{ background:linear-gradient(180deg,#FBB852,#F0962C); }
  .ghost{ background:rgba(255,250,243,.16); color:rgba(255,250,244,.95); }
  .ghost:hover{ background:rgba(255,250,243,.26); }
  .clear{ font-size:11px; color:rgba(255,235,210,.9); text-decoration:underline; cursor:pointer; background:none; padding:0; display:none; }
  .clear.show{ display:inline; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>
<body>
  <div class="card">
    <div class="title">Claude API key</div>
    <div class="sub">Stored encrypted on this machine. Used only to write your wrap-ups — your key never goes anywhere except Anthropic.</div>
    <input id="key" type="password" autocomplete="off" spellcheck="false" placeholder="sk-ant-…" />
    <div class="row">
      <span class="status" id="status">AI: —</span>
      <div class="actions">
        <button class="clear" id="clear">Clear saved key</button>
        <button class="ghost" id="cancel">Cancel</button>
        <button class="save" id="save">Save</button>
      </div>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const input = document.getElementById('key');
    const statusEl = document.getElementById('status');
    const clearBtn = document.getElementById('clear');

    function save(){ const v = input.value.trim(); if(v) ipcRenderer.send('apikey-save', v); else ipcRenderer.send('apikey-cancel'); }

    document.getElementById('save').addEventListener('click', save);
    document.getElementById('cancel').addEventListener('click', () => ipcRenderer.send('apikey-cancel'));
    clearBtn.addEventListener('click', () => ipcRenderer.send('apikey-clear'));
    input.addEventListener('keydown', (e) => { if(e.key === 'Enter') save(); if(e.key === 'Escape') ipcRenderer.send('apikey-cancel'); });
    window.addEventListener('keydown', (e) => { if(e.key === 'Escape') ipcRenderer.send('apikey-cancel'); });

    // main sends the current state once the page is ready.
    ipcRenderer.on('key-data', (_e, d) => {
      const label = d && d.status === 'cli' ? 'AI: Claude CLI (preferred)'
        : d && d.status === 'key' ? 'AI: using your API key'
        : 'AI: off — add a key for AI wraps';
      statusEl.textContent = label;
      if (d && d.present) { clearBtn.classList.add('show'); input.placeholder = '•••••••• (a key is saved — type to replace)'; }
    });

    window.addEventListener('DOMContentLoaded', () => input.focus());
    input.focus();
  </script>
</body>
</html>
